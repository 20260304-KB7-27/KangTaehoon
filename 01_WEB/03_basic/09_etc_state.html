<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            input:disabled {
                background-color: grey;
            }
            input:focus {
                background-color: orange;
            }
        </style>
    </head>
    <body>
        <h1>사용 가능</h1>
        <input />
        <h1>사용 불가능</h1>
        <input disabled="disabled" />
    </body>
</html>
