<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <style>
            h1 {
                background-color: orange;
                color: red !important;
            }
        </style>
    </head>
    <!-- 
    CSS
    - HTML 문서의 스타일을 정의하는 스타일 시트 언어
    - 캐스케이딩, 상속, 재사용성

    1. 외부 스타일 시트(.css)
    - 별도의 .css 파일을 생성해 HTML 문서와 연결
    
    2. 내부 스타일 시트
    - HTML 문서 내 head 태그 안에 style 태그를 사용하여 css 정의

    3. 인라인 스타일
    - HTML 요소의 style 속성에 직접 스타일 적용
    
    선택자
    - css에서 스타일을 적용할 HTML 요소를 선택하는 방법
    태그선택자 / ID / class / 전체(*) / 속성

    우선순위
    1. !important
    2. inline
    3. id selector
    4. class selector
    5. tag selector *
    7. 상속된 스타일
    -->
    <body>
        <h1 style="color: blue">CSS 선택자 기본</h1>
        <p></p>
    </body>
</html>
