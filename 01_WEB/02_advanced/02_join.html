<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <form>
            <fieldset style="width: 400px">
                <legend>회원가입</legend>

                <table>
                    <tr>
                        <td>
                            <label for="userid">사용자 ID</label>
                        </td>

                        <td>
                            <input type="text" id="userid" name="userid" />
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="password">비밀번호</label>
                        </td>
                        <td>
                            <input
                                type="password"
                                id="password"
                                name="password"
                            />
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="check-password">비밀번호 확인</label>
                        </td>
                        <td>
                            <input
                                type="password"
                                id="check-password"
                                name="check-password"
                            />
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="name">이름</label>
                        </td>
                        <td>
                            <input type="text" id="name" name="name" />
                        </td>
                    </tr>

                    <tr>
                        <td><label for="man">성별</label></td>
                        <td>
                            <input
                                name="gender"
                                id="man"
                                value="m"
                                type="radio"
                            />

                            <label for="man">남</label>
                            <input
                                name="gender"
                                id="woman"
                                value="w"
                                type="radio"
                            />
                            <label for="woman">여</label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="">취미</label>
                        </td>
                        <td>
                            <input name="soccer" id="soccer" type="checkbox" />
                            <label for="soccer">축구</label>
                            <input
                                name="baseball"
                                id="baseball"
                                type="checkbox"
                            />
                            <label for="baseball">야구</label>
                            <input
                                name="vollyball"
                                id="vollyball"
                                type="checkbox"
                            />
                            <label for="vollyball">배구</label>
                            <input
                                name="basketball"
                                id="basketball"
                                type="checkbox"
                            />
                            <label for="basketball">농구</label>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="email">email</label>
                        </td>
                        <td>
                            <input id="email" name="email" type="email" />
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="role">역할</label>
                        </td>
                        <td>
                            <select name="role" id="role">
                                <option>ADMIN</option>
                                <option>관리자</option>
                                <option>일반회원</option>
                            </select>
                        </td>
                    </tr>
                </table>
                <input type="submit" value="확인" />
                <input type="reset" value="다시쓰기" />
            </fieldset>
        </form>
    </body>
</html>
