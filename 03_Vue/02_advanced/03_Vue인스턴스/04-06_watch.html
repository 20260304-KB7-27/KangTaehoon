<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <p>
                <input v-model.lazy="name" placeholder="이름을  입력하세요" />
            </p>
            <p>
                <input
                    v-model.lazy="user.age"
                    placeholder="나이를 입력하세요"
                />
            </p>
            <p>
                <input
                    v-model.lazy="user.email"
                    placeholder="이메일을 입력하세요"
                />
            </p>
        </div>

        <script>
            const { createApp, ref, watch } = Vue;

            createApp({
                setup() {
                    const name = ref('');
                    const user = ref({
                        age: 0,
                        email: '',
                    });

                    // watch
                    // 반응형 데이터가 변경될 때 실행
                    // 데이터 변경에 따른 부가적인 작업을 할때 사용 (알림, 로깅, ...)

                    watch(name, (cur, prev) => {
                        console.log(`이름이 ${prev}에서 ${cur}로 변경됨`);
                    });

                    // 객체를 deep을 사용해서 감시할 경우 cur, prev 동일한 Proxy객체를 참조함.

                    watch(
                        () => ({ ...user.value }), // 객체를 복사
                        (cur, prev) => {
                            console.log(
                                `기존 사용자 : ${prev.age}, ${prev.email} -> 변경된 사용자 : ${cur.age}, ${cur.email}`,
                            );
                        },
                        { deep: true },
                    );

                    // watch(
                    //     ()=>({...user.value),
                    //     (cur, prev) => {
                    //         console.log(
                    //             `기존 사용자 : ${prev.age}, ${prev.email} -> 변경된 사용자 : ${cur.age}, ${cur.email}`,
                    //         );
                    //     },
                    //     {
                    //         deep: true,
                    //     },
                    // );

                    return {
                        name,
                        user,
                    };
                },
            }).mount('#app');
        </script>
    </body>
</html>
