<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <h1>:: ToDoList APP</h1>

            <!-- Todo 추가 -->
            <div>
                <!-- @keyup.enter : enter키를 누르면 addTodo 함수 호출 -->
                <input
                    type="text"
                    v-model.trim="todo"
                    @keyup.enter.exact="addTodo"
                    @keyup.ctrl.enter.exact="addTodo"
                />
                <button @click="addTodo">추가</button>
            </div>
            <!-- Todo 목록 보여주기 -->
            <ul>
                <li
                    v-for="todoItem in todoList"
                    ::key="todoItem.id"
                    @click="toggleCompleted(todoItem.id)"
                >
                    <span
                        :style="{ textDecoration : todoItem.completed ? 'line-through' : 'none'}"
                        >{{todoItem.todo}} {{todoItem.completed ? "[완료]" :
                        ""}}</span
                    >
                    <!-- 삭제하기  -->
                    <span @click="deleteTodo(todoItem.id)">삭제</span>
                </li>
            </ul>
        </div>

        <script>
            const { createApp, ref } = Vue;

            let ts = new Date().getDate();

            createApp({
                setup() {
                    const todo = ref('');
                    const todoList = ref([
                        { id: ts, todo: '자전거 타기', completed: false },
                        { id: ts + 1, todo: '딸과 공원 산책', completed: true },
                        {
                            id: ts + 2,
                            todo: '일요일 애견 카페',
                            completed: false,
                        },
                        { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
                    ]);

                    // create todo
                    const addTodo = (e) => {
                        // 빈 문자열일 경우 동작 안함
                        if (todo.value === '') return;

                        // 배열에 추가
                        todoList.value.push({
                            id: new Date().getTime(),
                            todo: todo.value,
                            completed: e.ctrlKey ? true : false,
                        });

                        //  todo 초기화
                        todo.value = '';
                    };
                    const deleteTodo = (id) => {
                        // findIndex(콜백) : 콜백함수가 true를 반환하는 첫 번쨰 요소의 인덱스를 반환
                        let index = todoList.value.findIndex(
                            (item) => id === item.id,
                        );

                        // splice (인덱스, 삭제할 요소의 갯수) : 인덱스부터 갯수만큼 배열의 요소를 삭제

                        todoList.value.splice(index, 1);
                    };

                    const toggleCompleted = (id) => {
                        let index = todoList.value.findIndex(
                            (item) => id === item.id,
                        );

                        todoList.value[index].completed =
                            !todoList.value[index].completed;
                    };
                    return {
                        todoList,
                        todo,
                        deleteTodo,
                        addTodo,
                        toggleCompleted,
                    };
                },
            }).mount('#app');
        </script>
    </body>
</html>
