<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Script스니펫</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        />

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }
            .title {
                text-align: center;
                font-weight: bold;
                font-size: 20pt;
            }
            .todo-done {
                text-decoration: line-through;
            }
            .container {
                padding: 10px 10px 10px 10px;
            }
            .panel-borderless {
                border: 0;
                box-shadow: none;
            }
            .pointer {
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div id="app" class="container">
            <div class="card card-body bg-light">
                <div classe="title">:: Todolist App</div>
            </div>
            <div class="card card-default card-borderless">
                <div class="card-body">
                    <!-- 추가 예정-->
                    <div class="row mb-3">
                        <div class="col">
                            <div class="input-group">
                                <input
                                    v-model.trim="todo"
                                    id="msg"
                                    type="text"
                                    class="form-control"
                                    name="msg"
                                    placeholder="할일을 여기에 입력!"
                                    @keyup.enter.exact="addTodo"
                                    @keyup.ctrl.enter.exact="addTodo"
                                />
                                <span
                                    @click="addTodo"
                                    class="btn btn-primary input-group-addon"
                                    >추가</span
                                >
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <ul
                                v-for="todoItem in sortedTodos"
                                :key="todoItem.id"
                                class="list-group"
                                @click="toggleCompleted(todoItem.id)"
                            >
                                <li
                                    class="list-group-item"
                                    :class="{'list-group-item-success' : todoItem.completed}"
                                >
                                    <span
                                        :class="{ 'todo-done': todoItem.completed}"
                                        >{{todoItem.todo}} {{todoItem.completed
                                        ? '(완료)' : ''}}</span
                                    >
                                    <span
                                        @click="deleteTodo(todoItem.id)"
                                        class="float-end badge bg-secondary pointer"
                                        >삭제</span
                                    >
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const { createApp, ref, computed } = Vue;

            createApp({
                setup() {
                    const ts = new Date().getTime();
                    const todo = ref('');
                    const todoList = ref([
                        { id: ts, todo: '자전거 타기', completed: false },
                        { id: ts + 1, todo: '딸과 공원 산책', completed: true },
                        {
                            id: ts + 2,
                            todo: '일요일 애견 카페',
                            completed: false,
                        },
                        { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
                    ]);

                    const addTodo = (e) => {
                        if (todo.value === '') return;
                        todoList.value.push({
                            id: new Date().getTime(),
                            todo: todo.value,
                            completed: e.ctrlKey ? true : false,
                        });
                        todo.value = '';
                    };
                    const deleteTodo = (id) => {
                        const index = todoList.value.findIndex(
                            (item) => id === item.id,
                        );

                        todoList.value.splice(index, 1);
                    };
                    const toggleCompleted = (id) => {
                        const index = todoList.value.findIndex(
                            (item) => id === item.id,
                        );
                        todoList.value[index].completed =
                            !todoList.value[index].completed;
                    };
                    const sortedTodos = computed(() => {
                        return [...todoList.value].sort((a, b) => {
                            if (a.completed !== b.completed) {
                                return a.completed ? 1 : -1;
                            }

                            return a.todo.localeCompare(b.todo, 'en');
                        });
                    });
                    return {
                        todoList,
                        todo,
                        addTodo,
                        deleteTodo,
                        toggleCompleted,
                        sortedTodos,
                    };
                },
            }).mount('#app');
        </script>
    </body>
</html>
